services:
  api:
    build:
      context: .
      target: development
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://smartdrop:smartdrop@postgres:5432/smartdrop
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # Hot reload en desarrollo

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartdrop
      POSTGRES_PASSWORD: smartdrop
      POSTGRES_DB: smartdrop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "smartdrop"]
      interval: 5s
      timeout: 3s
      retries: 5