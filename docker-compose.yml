services:
  api:
    build: .
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      DATABASE_URL: postgres://smartdrop:smartdrop@postgres:5432/smartdrop
      STELLAR_HORIZON_URL: https://horizon.stellar.org
      USDC_ISSUER: GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335AX2OBFLDTQLNUEHRGPTM6RIA
      PRICE_CACHE_TTL: 60
      PRICE_REFRESH_INTERVAL: 30
      PRICE_STALE_THRESHOLD: 5
      PRICE_ANOMALY_THRESHOLD: 10
      LOG_LEVEL: info
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:4000
    ports:
      - '4000:4000'
    build:
      context: .
      target: development
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://smartdrop:smartdrop@postgres:5432/smartdrop
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./src:/app/src   # Hot reload en desarrollo

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartdrop
      POSTGRES_PASSWORD: smartdrop
      POSTGRES_DB: smartdrop
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartdrop -d smartdrop']
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "smartdrop"]
      interval: 5s
      timeout: 3s
      retries: 5
